{% extends "base.html" %}
{% block title %}Buyer Profile | EcoMboa{% endblock %}
{% block content %}
<section class="card" style="max-width:760px;margin:0 auto;">
    <h1 style="margin-top:0;">Buyer company profile</h1>
    <form method="post" class="form-grid">
        {% csrf_token %}
        {% for field in form %}
            <div>
                <label class="field-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}<small class="helptext">{{ field.help_text }}</small>{% endif %}
                {{ field.errors }}
            </div>
        {% endfor %}
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn" type="submit">Save profile</button>
            <a class="pill" href="{% url 'buyers:index' %}">Back</a>
        </div>
    </form>
</section>
{% endblock %}
