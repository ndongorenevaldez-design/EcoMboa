{% extends "base.html" %}
{% block title %}Live Map | EcoMboa{% endblock %}
{% block extra_head %}
<link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
/>
<style>
    .map-layout {
        display: grid;
        grid-template-columns: minmax(280px, 340px) 1fr;
        gap: 12px;
    }
    #points-map {
        width: 100%;
        min-height: 560px;
        border-radius: 14px;
        border: 1px solid #cfe2d7;
    }
    .map-side {
        border: 1px solid #d5e8dc;
        border-radius: 14px;
        padding: 12px;
        background: #fcfffd;
        max-height: 560px;
        overflow: auto;
    }
    .point-card {
        border: 1px solid #d9e9de;
        border-radius: 12px;
        padding: 10px;
        margin-bottom: 10px;
        cursor: pointer;
        background: #fff;
    }
    .point-card:hover { background: #f2fff6; }
    @media (max-width: 860px) {
        .map-layout { grid-template-columns: 1fr; }
        .map-side { max-height: 260px; }
        #points-map { min-height: 420px; }
    }
</style>
{% endblock %}
{% block content %}
<section class="card">
    <div style="display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;align-items:center;">
        <div>
            <h1 style="margin:0;">Collection points map</h1>
            <p class="muted" style="margin:.35rem 0 0;">Real-time view of active drop-off and paid points.</p>
        </div>
        <a class="pill" href="{% url 'public:points' %}">List view</a>
    </div>
</section>

<section class="card map-layout">
    <aside class="map-side" id="points-list">Loading points...</aside>
    <div id="points-map"></div>
</section>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script>
    const centerYaounde = [3.8480, 11.5021];
    const map = L.map("points-map", { zoomControl: true }).setView(centerYaounde, 12);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    const listEl = document.getElementById("points-list");
    const markers = {};

    function buildPopup(point) {
        return `
            <div style="min-width:220px">
                <strong>${point.name}</strong><br>
                <span>${point.district} / ${point.neighborhood}</span><br>
                <small>${point.address || ""}</small><br>
                <small>Fill level: ${point.fill_level}%</small><br>
                <a href="/points/${point.id}/">View details</a>
            </div>
        `;
    }

    function renderList(points) {
        if (!points.length) {
            listEl.innerHTML = "<p class='muted'>No active points found.</p>";
            return;
        }
        listEl.innerHTML = points.map((point) => `
            <article class="point-card" data-id="${point.id}">
                <strong>${point.name}</strong>
                <div class="muted">${point.district} / ${point.neighborhood}</div>
                <div>Fill: ${point.fill_level}%</div>
            </article>
        `).join("");

        listEl.querySelectorAll(".point-card").forEach((el) => {
            el.addEventListener("click", () => {
                const marker = markers[el.dataset.id];
                if (marker) {
                    map.setView(marker.getLatLng(), 15);
                    marker.openPopup();
                }
            });
        });
    }

    fetch("/api/map/points/")
        .then((resp) => resp.json())
        .then((points) => {
            renderList(points);
            const bounds = [];
            points.forEach((point) => {
                if (point.latitude == null || point.longitude == null) {
                    return;
                }
                const marker = L.marker([point.latitude, point.longitude]).addTo(map);
                marker.bindPopup(buildPopup(point));
                markers[String(point.id)] = marker;
                bounds.push([point.latitude, point.longitude]);
            });
            if (bounds.length) {
                map.fitBounds(bounds, { padding: [28, 28] });
            }
        })
        .catch(() => {
            listEl.innerHTML = "<p class='muted'>Unable to load map points right now.</p>";
        });
</script>
{% endblock %}
