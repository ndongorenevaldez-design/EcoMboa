{% extends "base.html" %}
{% block title %}Update Mission Status | EcoMboa{% endblock %}
{% block content %}
<section class="card" style="max-width:720px;margin:0 auto;">
    <h1 style="margin-top:0;">Update mission #{{ mission.id }} status</h1>
    <form method="post" class="form-grid">
        {% csrf_token %}
        {% for field in form %}
            <div>
                <label class="field-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {{ field.errors }}
            </div>
        {% endfor %}
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn" type="submit">Save status</button>
            <a class="pill" href="{% url 'missions:detail' mission.pk %}">Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
