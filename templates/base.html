<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EcoMboa{% endblock %}</title>
    <style>
        :root {
            --bg-0: #f4f8f3;
            --bg-1: #dff2e6;
            --text: #15281d;
            --muted: #486357;
            --primary: #107548;
            --primary-2: #0a5b37;
            --card: #ffffff;
            --danger: #b33636;
            --radius: 18px;
            --shadow: 0 18px 40px rgba(16, 70, 45, 0.12);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 0% 0%, #ecffe2 0, transparent 32%),
                radial-gradient(circle at 100% 12%, #d4f5e5 0, transparent 28%),
                linear-gradient(135deg, var(--bg-0), var(--bg-1));
            min-height: 100vh;
        }

        .shell {
            width: min(1120px, 92vw);
            margin: 0 auto;
            padding: 24px 0 42px;
        }

        .topbar {
            background: rgba(255, 255, 255, 0.86);
            border: 1px solid rgba(16, 117, 72, 0.14);
            box-shadow: var(--shadow);
            border-radius: calc(var(--radius) + 6px);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            backdrop-filter: blur(6px);
        }

        .brand {
            font-weight: 800;
            letter-spacing: 0.4px;
            color: var(--primary-2);
            text-decoration: none;
            font-size: 1.1rem;
        }

        .nav-links {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .pill {
            display: inline-block;
            text-decoration: none;
            border-radius: 999px;
            border: 1px solid rgba(16, 117, 72, 0.22);
            color: var(--primary-2);
            background: #fff;
            padding: 8px 14px;
            font-size: 0.88rem;
            font-weight: 600;
            transition: transform 0.16s ease, background 0.16s ease;
        }

        .pill:hover { transform: translateY(-1px); background: #f0fff6; }

        .main {
            margin-top: 22px;
            display: grid;
            gap: 16px;
        }

        .card {
            background: var(--card);
            border: 1px solid rgba(22, 78, 50, 0.12);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: clamp(16px, 3vw, 28px);
        }

        .muted { color: var(--muted); }

        .form-grid {
            display: grid;
            gap: 12px;
        }

        .form-control {
            width: 100%;
            border: 1px solid #b7cfc2;
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 0.97rem;
            outline: none;
            background: #fcfffd;
            transition: border-color 0.16s ease, box-shadow 0.16s ease;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(16, 117, 72, 0.13);
        }

        .btn {
            border: 0;
            border-radius: 12px;
            padding: 11px 16px;
            background: linear-gradient(120deg, var(--primary), #1b915e);
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover { filter: brightness(0.95); }

        .alert {
            border-radius: 12px;
            padding: 10px 12px;
            font-size: 0.92rem;
            border: 1px solid;
        }
        .alert.success { background: #edfff3; border-color: #85c9a2; color: #1a633f; }
        .alert.error { background: #fff2f2; border-color: #e0a0a0; color: #7a2222; }

        .field-label { font-size: 0.89rem; font-weight: 700; margin-bottom: 4px; display: block; }
        .helptext { font-size: 0.8rem; color: var(--muted); margin-top: 4px; display: block; }
        .errorlist { color: var(--danger); margin: 6px 0 0; padding-left: 16px; }

        @media (max-width: 720px) {
            .topbar { gap: 12px; align-items: flex-start; flex-direction: column; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <a href="{% url 'public:home' %}" class="brand">EcoMboa</a>
            <nav class="nav-links">
                {% if user.is_authenticated %}
                    <a class="pill" href="{% url 'accounts:profile' %}">My profile</a>
                    <a class="pill" href="{% url 'accounts:role_redirect' %}">My space</a>
                    <a class="pill" href="{% url 'account_logout' %}">Sign out</a>
                {% else %}
                    <a class="pill" href="{% url 'account_login' %}">Sign in</a>
                    <a class="pill" href="{% url 'account_signup' %}">Create account</a>
                {% endif %}
            </nav>
        </header>

        <main class="main">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert {% if message.tags == 'error' %}error{% else %}success{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
