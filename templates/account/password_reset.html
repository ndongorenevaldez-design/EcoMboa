{% extends "base.html" %}
{% block title %}Reset Password | EcoMboa{% endblock %}
{% block content %}
<section class="card" style="max-width:560px;margin:0 auto;">
    <h1 style="margin-top:0;">Reset your password</h1>
    <p class="muted">Enter your account email and we will send reset instructions.</p>
    <form method="post" action="{% url 'account_reset_password' %}" class="form-grid">
        {% csrf_token %}
        {% for field in form %}
            <div>
                <label class="field-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {{ field.errors }}
            </div>
        {% endfor %}
        <button class="btn" type="submit">Send reset link</button>
    </form>
</section>
{% endblock %}
